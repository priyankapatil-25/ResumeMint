name: Build & Deploy ResumeMint

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/priyankapatil-25/resumemint

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./resumemint
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer stack update
        run: |
          curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            --fail --silent --show-error \
            --max-time 30

      - name: Verify deployment is live
        run: |
          echo "Waiting for deployment to come up..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://gcektpo.anvayro.com || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
              echo "Deployment verified! HTTP status: $STATUS"
              exit 0
            fi
            echo "Attempt $i/30 — HTTP status: $STATUS. Retrying in 10s..."
            sleep 10
          done
          echo "Deployment verification failed after 5 minutes."
          exit 1
